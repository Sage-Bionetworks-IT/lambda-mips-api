AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  MIPS transform and cache API

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 60

Parameters:
  AcmCertificateArn:
    Description: The Amazon Resource Name (ARN) of an AWS Certificate Manager (ACM) certificate.
    Type: String
    Default: ""
  DnsNames:
    Type: CommaDelimitedList
    Description: List of role ARNs to manage the encryption key
    Default: ""
  MipOrganization:
    Type: String
    Description: Log in to this organization in the finance system
  SsmParamPrefix:
    Type: String
    Description: Path prefix for secure parameters in SSM
    Default: '/lambda/mipsSecret'
  SsmKeyAdminArns:
    Type: CommaDelimitedList
    Description: List of role ARNs to manage the encryption key
  SsmAliasPrefix:
    Type: String
    Default: lambda-mips-api
    Description: Prefix used in the KMS Key Alias name
  CacheTTL:
    Type: Number
    Default: 86400
    Description: Maximum number of seconds until cached responses expire; default 86400 (1 day)
  CodesToOmit:
    Type: String
    Description: Comma-delimited list of numeric codes to ignore (treat as inactive).
    Default: '999900,999800,999700,990500'
  NoProgramCode:
    Type: String
    Description: Numeric code for the "No Program" meta-program
    Default: '000000'
  OtherCode:
    Type: String
    Description: Numeric code for the "Other" meta-program
    Default: '000001'


Conditions:
  HasAcmCertificateArn: !Not [ !Equals [ !Ref AcmCertificateArn, "" ] ]
  # Join on an empty string because DnsNames is a comma-delimited list, not a string
  HasDnsNames: !Not [ !Equals [ !Join [ "", !Ref DnsNames ], "" ] ]

Resources:
  # Explicit API definition to enable IAM auth on /balances
  MipsApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Auth:
        # Default is no auth (public); override per-endpoint below
        DefaultAuthorizer: NONE
      EndpointConfiguration:
        Type: REGIONAL

  CacheBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: IntelligentTieringClassTransitionRule
            Status: Enabled
            Transitions:
              - TransitionInDays: 3
                StorageClass: INTELLIGENT_TIERING
          - Id: ExpireOldObjectVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 365

  CacheBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CacheBucket
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Principal:
              AWS: !GetAtt FunctionRole.Arn
            Resource:
              - !Sub "${CacheBucket.Arn}/*"
              - !Sub "${CacheBucket.Arn}"

  Function:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: .
      Handler: mip_api.lambda_handler
      Runtime: python3.12
      Environment:
        Variables:
          ApiChartOfAccounts: '/accounts'
          ApiValidTags: '/tags'
          ApiTrialBalances: '/balances'
          MipOrg: !Ref MipOrganization
          SsmPath: !Ref SsmParamPrefix
          CodesToOmit: !Ref CodesToOmit
          NoProgramCode: !Ref NoProgramCode
          OtherCode: !Ref OtherCode
          CacheBucket: !Ref CacheBucket
          CacheBucketPrefix: 'mip-cache/'
      Role: !GetAtt FunctionRole.Arn
      Events:
        ChartOfAccounts:
          Type: Api # More info about API Event Source: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#api
          Properties:
            Path: '/accounts'
            Method: get
            RestApiId: !Ref MipsApi
        TrialBalances:
          Type: Api # More info about API Event Source: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#api
          Properties:
            Path: '/balances'
            Method: get
            RestApiId: !Ref MipsApi
            Auth:
              Authorizer: AWS_IAM
        ValidTags:
          Type: Api # More info about API Event Source: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#api
          Properties:
            Path: '/tags'
            Method: get
            RestApiId: !Ref MipsApi

  FunctionRole:   # execute lambda function with this role
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaAccess
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmParamPrefix}'
                Action:
                  - 'ssm:GetParameter*'
                Effect: Allow

  CloudFrontCache:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultCacheBehavior:
          CachePolicyId: !Ref CloudFrontCachePolicy
          TargetOriginId: LambdaOrigin
          ViewerProtocolPolicy: 'redirect-to-https'
        CacheBehaviors:
          # Block /balances at CloudFront — must use API Gateway directly with IAM auth
          - PathPattern: '/balances*'
            TargetOriginId: LambdaOrigin
            ViewerProtocolPolicy: 'redirect-to-https'
            CachePolicyId: !Ref CloudFrontCachePolicy
            FunctionAssociations:
              - EventType: viewer-request
                FunctionARN: !GetAtt BlockBalancesFunction.FunctionARN
        Origins:
          - Id: LambdaOrigin
            DomainName: !Sub "${MipsApi}.execute-api.${AWS::Region}.amazonaws.com"
            OriginPath: /Prod
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginReadTimeout: 60
        HttpVersion: http2
        Aliases: !If [ HasDnsNames, !Ref DnsNames, !Ref "AWS::NoValue" ]
        ViewerCertificate:
          CloudFrontDefaultCertificate: !If [ HasAcmCertificateArn, !Ref "AWS::NoValue", True ]
          AcmCertificateArn: !If [ HasAcmCertificateArn, !Ref AcmCertificateArn, !Ref "AWS::NoValue" ]
          MinimumProtocolVersion: !If [ HasAcmCertificateArn, "TLSv1.2_2021", !Ref "AWS::NoValue" ]
          SslSupportMethod: !If [ HasAcmCertificateArn, "sni-only", !Ref "AWS::NoValue" ]

  # CloudFront Function to return 403 for /balances requests via CloudFront
  BlockBalancesFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "block-balances-${MipsApi}"
      AutoPublish: true
      FunctionConfig:
        Comment: "Return 403 for /balances — must use API Gateway directly with IAM auth"
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          return {
            statusCode: 403,
            statusDescription: 'Forbidden',
            headers: { 'content-type': { value: 'application/json' } },
            body: '{"error": "The /balances endpoint requires IAM authentication. Use the API Gateway URL directly."}'
          };
        }

  CloudFrontCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub "LambdaCache-${MipsApi}"
        MinTTL: 0
        MaxTTL: !Ref CacheTTL
        DefaultTTL: !Ref CacheTTL
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          # Only pass query-string parameters to the lambda,
          # not cookies or headers because we don't use them
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: all

  # Key for encrypting our secret parameter
  # The secret parameter will need to be created manually in SSM
  # https://aws.amazon.com/blogs/compute/sharing-secrets-with-aws-lambda-using-aws-systems-manager-parameter-store/
  SsmKey:
    Type: AWS::KMS::Key
    Properties:
      Enabled: True
      EnableKeyRotation: True
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Lambda Access
            Principal:
              AWS: !GetAtt FunctionRole.Arn
            Resource: '*'
            Action:
              - 'kms:Encrypt'
              - 'kms:Decrypt'
              - 'kms:ReEncrypt*'
              - 'kms:GenerateDataKey*'
              - 'kms:DescribeKey'
            Effect: Allow
          - Sid: Admin Access
            Principal:
              AWS: !Ref SsmKeyAdminArns
            Resource: '*'
            Action:
              - 'kms:Create*'
              - 'kms:Encrypt'
              - 'kms:ReEncrypt*'
              - 'kms:Decrypt'
              - 'kms:Describe*'
              - 'kms:Enable*'
              - 'kms:List*'
              - 'kms:Put*'
              - 'kms:Update*'
              - 'kms:Revoke*'
              - 'kms:Disable*'
              - 'kms:Get*'
              - 'kms:Delete*'
              - 'kms:ScheduleKeyDeletion'
              - 'kms:CancelKeyDeletion'
            Effect: Allow

  SsmKeyAlias:  # A friendly name used in the console
    Type: AWS::KMS::Alias
    Properties:
      TargetKeyId: !Ref SsmKey
      AliasName: !Sub 'alias/${SsmAliasPrefix}-ssm-key'

Outputs:
  ApiRouteChartOfAccounts:
    Description: "CloudFront URL for the full chart of accounts"
    Value: !Sub "https://${CloudFrontCache.DomainName}/accounts"
  ApiRouteTrialBalances:
    Description: "API Gateway URL for trial balances (IAM auth required)"
    Value: !Sub "https://${MipsApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/balances"
  ApiRouteValidTags:
    Description: "CloudFront URL for listing valid CostCenter tag values"
    Value: !Sub "https://${CloudFrontCache.DomainName}/tags"
  OriginUrl:
    Description: "API Gateway base URL with stage, used by downstream lambdas to construct endpoint URLs"
    Value: !Sub "https://${MipsApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
    Export:
      Name: !Sub '${AWS::Region}-${AWS::StackName}-OriginUrl'
  BalancesExecuteArn:
    Description: "execute-api ARN for the /balances endpoint (IAM auth), used by downstream lambda IAM policies"
    Value: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${MipsApi}/Prod/GET/balances"
    Export:
      Name: !Sub '${AWS::Region}-${AWS::StackName}-BalancesExecuteArn'
  FunctionArn:
    Description: "Lambda Function ARN"
    Value: !GetAtt Function.Arn
  FunctionRoleArn:
    Description: "Implicit IAM Role created for function"
    Value: !GetAtt FunctionRole.Arn
  CloudfrontDomain:
    Description: "Domain name for the Cloudfront distribution"
    Value: !GetAtt CloudFrontCache.DomainName
    Export:
      Name: !Sub '${AWS::Region}-${AWS::StackName}-CloudfrontDomain'
